<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>التقويم الدراسي التفاعلي | بوابة مسار</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef5f8;--bg2:#dcecf2;--card:rgba(255,255,255,.86);--text:#16313c;--muted:#61757e;--line:rgba(22,49,60,.14);
  --primary:#158aa2;--primary2:#0d6174;--accent:#d7a63f;--study:#28a978;--holiday:#e0a83d;--exam:#d35454;--national:#1976d2;--admin:#6b7280;--weekend:#7c3aed;--note:#2563eb;--task:#16a34a;
  --shadow:0 18px 45px rgba(10,55,70,.14);--radius:22px;
}
[data-theme="dark"]{
  --bg:#071820;--bg2:#102934;--card:rgba(18,45,57,.78);--text:#eaf7fb;--muted:#a8c4cc;--line:rgba(255,255,255,.13);
  --primary:#20a7c3;--primary2:#158aa2;--accent:#e2bb5d;--shadow:0 22px 50px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{max-width:100%;overflow-x:hidden}
body{margin:0;font-family:'Almarai','Arial',sans-serif;font-weight:400;line-height:1.75;background:radial-gradient(circle at top right,var(--bg2),var(--bg) 42%,var(--bg));color:var(--text);min-height:100vh}
body:before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:linear-gradient(135deg,rgba(21,138,162,.10),transparent 32%),linear-gradient(315deg,rgba(215,166,63,.09),transparent 40%)}
.container{width:min(1240px,94vw);margin:auto}.hero{padding:24px 0 12px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.brand{display:flex;gap:14px;align-items:center;min-width:0}.logo{width:62px;height:62px;border-radius:20px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:grid;place-items:center;color:#fff;font-size:31px;box-shadow:var(--shadow);flex:0 0 auto}
h1{margin:0;font-size:clamp(25px,4vw,42px);font-weight:800;line-height:1.25;letter-spacing:-.5px}.subtitle{margin:5px 0 0;color:var(--muted);line-height:1.7}
.actions{display:flex;gap:8px;flex-wrap:wrap}
button,.btn,input,textarea,select{font-family:inherit}
.btn{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:14px;padding:10px 14px;cursor:pointer;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.06);transition:.18s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{transform:translateY(-2px);border-color:var(--primary)}.btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:0}.btn.gold{background:linear-gradient(135deg,#f0c86b,var(--accent));color:#3a2a05;border:0}.btn.danger{background:rgba(211,84,84,.12);border-color:rgba(211,84,84,.35)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(13px);overflow:hidden;min-width:0}
.datetime-card{margin:18px 0;padding:22px 20px;text-align:center;background:linear-gradient(135deg,rgba(21,138,162,.16),rgba(215,166,63,.08))}
.datetime-top{display:flex;align-items:center;justify-content:center;gap:13px;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:12px}
.datetime-icon{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;font-size:26px}.datetime-day{font-size:21px;font-weight:700;line-height:1.35}.datetime-time{font-size:22px;font-weight:700;color:var(--primary);line-height:1.35}.datetime-h{font-size:20px;font-weight:700;line-height:1.8}.datetime-g{font-size:17px;color:var(--muted);line-height:1.8}
.status-card{padding:18px;display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:center;background:linear-gradient(135deg,rgba(21,138,162,.16),rgba(255,255,255,.05))}
.status-title{font-size:24px;font-weight:700;margin:0 0 6px;line-height:1.55}.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.chip{border:1px solid var(--line);background:rgba(255,255,255,.16);border-radius:999px;padding:7px 10px;font-weight:700;font-size:13px;color:var(--text);max-width:100%;overflow-wrap:anywhere}
.progress-wrap{padding:10px}.progress-line{height:18px;border-radius:999px;background:rgba(128,128,128,.18);overflow:hidden;border:1px solid var(--line);margin-top:8px}.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--primary2),var(--primary),var(--accent));border-radius:999px;transition:width .8s}
.tabs{display:flex;gap:8px;overflow:auto;padding:12px 0;margin-top:10px;position:sticky;top:0;z-index:10;background:linear-gradient(var(--bg),rgba(255,255,255,0));scrollbar-width:thin}.tab{white-space:nowrap;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:10px 15px;font-weight:700;cursor:pointer;color:var(--text)}.tab.active{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border-color:transparent}
.panel{display:none;padding:14px 0 34px}.panel.active{display:block}.section-title{font-size:25px;margin:12px 0;font-weight:700;line-height:1.35}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.event{padding:16px;position:relative}.event h3{margin:0 0 8px;font-size:21px;font-weight:700;line-height:1.55;padding-left:58px}.note{color:var(--muted);line-height:1.9;overflow-wrap:anywhere}.status-pill{position:absolute;left:14px;top:14px;border-radius:999px;padding:5px 9px;background:rgba(0,0,0,.08);font-weight:700;font-size:12px}
.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 9px;color:#fff;font-weight:700;font-size:12px}.tag.study{background:var(--study)}.tag.holiday{background:var(--holiday);color:#231803}.tag.exam{background:var(--exam)}.tag.national{background:var(--national)}.tag.admin{background:var(--admin)}.tag.weekend{background:var(--weekend)}
.meta{display:grid;grid-template-columns:1fr;gap:8px;margin:10px 0}.datebox{background:rgba(128,128,128,.10);border:1px solid var(--line);border-radius:14px;padding:10px;line-height:1.7}.datebox b{display:block;color:var(--muted);font-size:12px;margin-bottom:5px;font-weight:700}.dayname{display:block;font-weight:700;color:var(--text)}.hijri-line{display:block;font-weight:700;color:var(--text)}.greg-line{display:block;color:var(--muted);font-weight:400}.range-sep{display:inline-block;color:var(--muted);font-size:12px;margin:4px 0}.event-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.week-summary,.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:8px 0 16px}.stat{padding:14px;text-align:center}.stat b{font-size:30px;display:block;color:var(--primary);font-weight:700}.stat span{color:var(--muted)}
.term-switch{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 16px}.term-switch .btn.active{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff}
.week-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.week{padding:12px}.week.current{outline:3px solid var(--accent)}.week.full{border-top:5px solid var(--study)}.week.national-week{border-top:5px solid var(--national)}.week.break-week{border-top:5px solid var(--holiday)}.week.exam-week{border-top:5px solid var(--exam)}
.week-head{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border-radius:14px;padding:9px;font-weight:700;margin-bottom:8px;gap:8px}.week-type{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.week-badge{border-radius:999px;padding:5px 8px;font-size:11px;font-weight:700;color:#fff;line-height:1.5}.week-badge.full{background:var(--study)}.week-badge.national{background:var(--national)}.week-badge.break{background:var(--holiday);color:#231803}.week-badge.exam{background:var(--exam)}.week-badge.weekend{background:var(--weekend)}
.week-days-list{display:grid;gap:6px;margin-top:8px}.week-day-item{display:grid;grid-template-columns:82px 1fr;gap:8px;align-items:center;padding:8px 9px;border:1px solid var(--line);border-radius:12px;background:rgba(128,128,128,.06);cursor:pointer}.week-day-name{font-weight:700;color:var(--primary);white-space:nowrap}.week-day-date{min-width:0;line-height:1.6}.week-day-date .greg-line{font-size:12px}.week-day-item.weekend-day{background:rgba(124,58,237,.10);border-color:rgba(124,58,237,.40)}.week-day-item.holiday-day{background:rgba(224,168,61,.13);border-color:rgba(224,168,61,.55)}.week-day-item.national-day{background:rgba(25,118,210,.12);border-color:rgba(25,118,210,.55)}.week-day-item.exam-day{background:rgba(211,84,84,.12);border-color:rgba(211,84,84,.55)}.week-day-item.has-personal{box-shadow:0 0 0 2px rgba(37,99,235,.18) inset}.weekend-note{display:inline-block;margin-top:4px;color:var(--weekend);font-weight:700;font-size:11px}
.personal-summary{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}.personal-summary span{border-radius:999px;padding:3px 7px;font-size:11px;font-weight:700;color:#fff}.personal-summary .note-pill{background:var(--note)}.personal-summary .task-pill{background:var(--task)}
.calendar-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}.month-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:7px}.weekday,.daycell{padding:9px;border-radius:14px;text-align:center;border:1px solid var(--line)}.weekday{font-weight:700;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff}.daycell{min-height:96px;background:var(--card);cursor:pointer;text-align:right}.daycell.out{opacity:.35}.daycell.today{outline:2px solid var(--accent)}.daycell.weekend-cell{background:linear-gradient(135deg,rgba(124,58,237,.10),rgba(255,255,255,.04)),var(--card)}.daycell.has-personal{box-shadow:0 0 0 2px rgba(37,99,235,.18) inset}.daycell .g{font-weight:700;font-size:18px}.daycell .h{font-size:12px;color:var(--muted);font-weight:400;line-height:1.4}.event-dot,.personal-dot{display:block;margin-top:5px;border-radius:9px;padding:3px 5px;color:#fff;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400}.personal-dot.note-dot{background:var(--note)}.personal-dot.task-dot{background:var(--task)}.event-dot.weekend{background:var(--weekend)}.daycell.national-cell{border-color:var(--national)}.daycell.holiday-cell{border-color:var(--holiday)}.daycell.exam-cell{border-color:var(--exam)}
.donut-wrap{display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:center;padding:16px}.donut{width:260px;height:260px;margin:auto}.legend{display:grid;gap:10px}.legend div{padding:12px;border-radius:14px;border:1px solid var(--line);background:rgba(128,128,128,.08)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;place-items:center;z-index:99;padding:18px}.modal.show{display:grid}.modal-box{width:min(640px,94vw);padding:20px;max-height:88vh;overflow:auto}.close{float:left;font-size:24px;border:0;background:transparent;color:var(--text);cursor:pointer}.toast{position:fixed;bottom:18px;right:18px;background:var(--text);color:var(--bg);padding:12px 16px;border-radius:16px;box-shadow:var(--shadow);display:none;z-index:110;font-weight:700}.footer{padding:20px;text-align:center;color:var(--muted);font-weight:400}
.day-manager{display:grid;gap:12px;margin-top:12px}.day-manager-section{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(128,128,128,.07)}.day-manager-section h3{margin:0 0 8px;font-size:17px;padding-left:0}.day-manager textarea,.day-manager input{width:100%;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:12px;padding:10px;margin:6px 0}.day-manager textarea{min-height:88px;resize:vertical}.task-row{display:flex;gap:8px;align-items:center;margin:6px 0;padding:7px;border-radius:10px;background:rgba(128,128,128,.08)}.task-row input{width:auto;margin:0}.task-row span{flex:1}.day-manager-actions{display:flex;gap:8px;flex-wrap:wrap}
.audit{padding:16px}.audit-list{display:grid;gap:8px}.audit-ok{padding:10px;border-radius:12px;background:rgba(40,169,120,.12);border:1px solid rgba(40,169,120,.35)}.center-card{text-align:center}.center-card h3{padding-left:0}.center-card .status-pill{position:static;display:inline-flex;margin-bottom:8px}
@media(max-width:1000px){.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.week-grid{grid-template-columns:1fr}.stats,.week-summary{grid-template-columns:repeat(2,minmax(0,1fr))}.status-card,.donut-wrap{grid-template-columns:1fr}}
@media(max-width:640px){.container{width:min(100% - 24px,100%)}.hero{padding:16px 0 8px}.brand{align-items:flex-start}.logo{width:50px;height:50px;border-radius:16px;font-size:25px}h1{font-size:24px;letter-spacing:0}.subtitle{font-size:13px}.actions{display:grid;grid-template-columns:1fr 1fr;width:100%;gap:8px}.btn{padding:10px 11px;font-size:13px;min-width:0}.datetime-card{padding:16px 12px}.datetime-icon{width:48px;height:48px;font-size:24px}.datetime-day{font-size:20px}.datetime-time{font-size:21px}.datetime-h{font-size:18px}.datetime-g{font-size:15px}.status-card{padding:14px}.status-title{font-size:19px}.chip{font-size:12px;padding:6px 8px}.tabs{margin-inline:-12px;padding:10px 12px}.tab{font-size:13px;padding:9px 12px}.section-title{font-size:21px}.cards,.stats,.week-summary{grid-template-columns:1fr}.event{padding:14px}.event h3{font-size:18px;padding-left:58px}.status-pill{left:12px;top:12px;font-size:11px}.datebox{font-size:13px}.datebox .hijri-line{font-size:14px}.datebox .greg-line{font-size:13px}.week{padding:10px}.week-head{font-size:13px}.week-badge{font-size:10.5px}.week-day-item{grid-template-columns:64px 1fr;padding:8px}.week-day-name{font-size:12px}.week-day-date .hijri-line{font-size:12px}.week-day-date .greg-line{font-size:11px}.month-grid{gap:3px}.weekday{font-size:10px;padding:7px 2px;border-radius:10px}.daycell{min-height:76px;padding:5px 3px;border-radius:10px}.daycell .g{font-size:14px}.daycell .h{font-size:9.5px}.event-dot,.personal-dot{font-size:8.5px;padding:2px 3px;margin-top:3px}.calendar-head .actions{width:100%;grid-template-columns:1fr 1.4fr 1fr}.calendar-head .btn.primary{font-size:11px;line-height:1.5;white-space:normal}.donut{width:220px;height:220px}.modal{padding:10px}.modal-box{width:100%;padding:16px}.footer{font-size:12px;padding:16px 12px}.center-card h3{padding-left:0}.day-manager-actions{display:grid;grid-template-columns:1fr}}
@media(max-width:390px){.container{width:min(100% - 18px,100%)}h1{font-size:22px}.actions{grid-template-columns:1fr}.month-grid{gap:2px}.weekday{font-size:9px}.daycell{min-height:68px}.event-dot,.personal-dot{font-size:8px}}

/* ===== شريط الحدث القادم مثل شريط المباراة القادمة ===== */
.next-event-bar{
  position:sticky;
  top:0;
  z-index:60;
  background:rgba(7,24,32,.94);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.14);
  padding:8px 10px;
}
[data-theme="light"] .next-event-bar{
  background:rgba(255,255,255,.94);
  border-bottom:1px solid rgba(22,49,60,.14);
}
.next-event-inner{
  width:min(1240px,94vw);
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}
.next-event-mini{
  position:relative;
  border:1px solid rgba(215,166,63,.48);
  background:rgba(255,255,255,.10);
  color:var(--text);
  border-radius:999px;
  padding:7px 12px;
  font-weight:800;
  font-size:13px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
  max-width:100%;
}
[data-theme="dark"] .next-event-mini{color:#eaf7fb}
.next-event-mini::before{
  content:"";
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 0 rgba(215,166,63,.55);
  animation:nextAcademicPulse 1.8s infinite;
}
@keyframes nextAcademicPulse{
  0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(215,166,63,.55)}
  50%{transform:scale(1.25);box-shadow:0 0 12px 4px rgba(215,166,63,.35)}
}
.speak-event-btn{
  border:1px solid rgba(215,166,63,.50);
  background:rgba(215,166,63,.14);
  color:var(--accent);
  border-radius:999px;
  padding:5px 9px;
  cursor:pointer;
  font-weight:800;
}
.next-event-focus{
  animation:nextEventFocus 1.9s ease-in-out 1;
  outline:4px solid var(--accent);
}
@keyframes nextEventFocus{
  0%{transform:scale(1);box-shadow:var(--shadow)}
  35%{transform:scale(1.015);box-shadow:0 0 0 7px rgba(215,166,63,.23),var(--shadow)}
  100%{transform:scale(1);box-shadow:var(--shadow)}
}
@media(max-width:640px){
  .next-event-inner{width:min(100% - 20px,100%);display:grid;grid-template-columns:1fr auto}
  .next-event-mini{white-space:normal;line-height:1.6;justify-content:center;text-align:center;border-radius:16px;font-size:12px}
  .speak-event-btn{border-radius:14px}
}


/* ===== البطاقة العائمة الذكية: أين أنا الآن؟ ===== */
.smart-now-card{
  position:fixed;
  inset-inline-end:18px;
  bottom:18px;
  z-index:95;
  width:min(340px,calc(100vw - 28px));
  background:var(--card);
  color:var(--text);
  border:1px solid var(--line);
  border-top:5px solid var(--accent);
  border-radius:22px;
  box-shadow:0 20px 48px rgba(0,0,0,.26);
  backdrop-filter:blur(14px);
  overflow:hidden;
}
.smart-now-card.collapsed .smart-now-body{display:none}
.smart-now-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding:12px 13px;
  cursor:pointer;
  background:linear-gradient(135deg,rgba(215,166,63,.16),rgba(21,138,162,.10));
}
.smart-now-title{
  font-weight:800;
  display:flex;
  align-items:center;
  gap:7px;
}
.smart-now-title::before{
  content:"";
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--accent);
  animation:smartNowPulse 1.8s infinite;
}
@keyframes smartNowPulse{
  0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(215,166,63,.55)}
  50%{transform:scale(1.25);box-shadow:0 0 12px 4px rgba(215,166,63,.35)}
}
.smart-now-toggle{
  border:0;
  background:transparent;
  color:var(--text);
  font-weight:900;
  cursor:pointer;
  font-size:16px;
}
.smart-now-body{padding:13px;display:grid;gap:9px}
.smart-now-line{
  border:1px solid var(--line);
  background:rgba(128,128,128,.08);
  border-radius:14px;
  padding:9px 10px;
  line-height:1.7;
}
.smart-now-label{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}
.smart-now-value{font-weight:800}
.smart-now-actions{
  display:grid;
  grid-template-columns:1fr 1fr auto;
  gap:7px;
}
.smart-now-actions .btn{padding:9px 8px;font-size:12px}
.smart-now-focus{
  animation:smartNowFocus 1.9s ease-in-out 1;
  outline:4px solid var(--accent);
}
@keyframes smartNowFocus{
  0%{transform:scale(1);box-shadow:var(--shadow)}
  35%{transform:scale(1.015);box-shadow:0 0 0 7px rgba(215,166,63,.23),var(--shadow)}
  100%{transform:scale(1);box-shadow:var(--shadow)}
}
@media(max-width:640px){
  .smart-now-card{
    inset-inline:10px;
    bottom:10px;
    width:auto;
    border-radius:18px;
  }
  .smart-now-body{padding:10px}
  .smart-now-actions{grid-template-columns:1fr 1fr}
  .smart-now-actions .speak-compact{grid-column:1 / -1}
}


/* Quick Monitor Rings */
.quick-monitor{margin:16px 0 22px;padding:18px}
.quick-monitor-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.quick-monitor-title{margin:0;font-size:23px;font-weight:800}
.quick-monitor-subtitle{color:var(--muted);font-weight:700;font-size:13px}
.quick-rings{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.quick-ring-card{border:1px solid var(--line);background:rgba(128,128,128,.07);border-radius:22px;padding:15px 10px;text-align:center;cursor:pointer;transition:.18s;min-width:0}
.quick-ring-card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 12px 30px rgba(0,0,0,.10)}
.quick-ring{width:118px;height:118px;border-radius:50%;margin:0 auto 10px;display:grid;place-items:center;background:radial-gradient(circle at center,var(--card) 0 57%,transparent 58%),conic-gradient(var(--ring-color) var(--ring-progress),rgba(128,128,128,.18) 0);border:1px solid var(--line)}

function hijriReadable(txt){
  const months=['','محرم','صفر','ربيع الأول','ربيع الآخر','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];
  let m=txt.match(/(\d+)\s*\/\s*(\d+)\s*\/\s*(\d+)/);
  if(!m) return txt;
  return `${m[1]} من ${months[parseInt(m[2])]||''} لعام ${m[3]} هجرية`;
}

function daysUntilDate(dateStr){return daysBetween(iso(new Date()), dateStr)}
function weeksFromDays(days){return Math.max(0, Math.ceil(Math.max(0,days)/7))}

}
function renderSettings(){$('panel-settings').innerHTML=`<h2 class="section-title">الإعدادات</h2><div class="cards"><div class="card event"><h3>المظهر</h3><button class="btn primary" onclick="toggleTheme()">تبديل /الفاتح</button></div><div class="card event"><h3>الملاحظات والمهام</h3><p class="note">تُحفظ محلياً على نفس الجهاز، ويمكن استخدامها في أيام الدراسة أو الجمعة والسبت.</p><div class="event-actions"><button class="btn primary" onclick="exportPersonalJSON()">تصدير JSON</button><button class="btn" onclick="exportPersonalCSV()">تصدير CSV</button><button class="btn" onclick="importPersonalJSON()">استيراد JSON</button><button class="btn danger" onclick="clearPersonalData()">مسح الكل</button></div></div><div class="card event"><h3>المصدر</h3><p class="note">تم الاعتماد على ملف PDF المرفق: صفحات التقويم العام وتوزيع أسابيع الفصلين.</p></div></div>`}
function renderAudit(){$('panel-audit').innerHTML=`<h2 class="section-title">مراجعة وتدقيق قبل النشر</h2><div class="card audit"><div class="audit-list"><div class="audit-ok">✓ الفصل الأول: 19 أسبوعاً من صفحة توزيع الأسابيع.</div><div class="audit-ok">✓ الفصل الثاني: 19 أسبوعاً من صفحة توزيع الأسابيع.</div><div class="audit-ok">✓ أيام الدراسة الرسمية: الأحد إلى الخميس.</div><div class="audit-ok">✓ الجمعة والسبت معروضان كعطلة أسبوعية لاستخدام الملاحظات والمهام.</div><div class="audit-ok">✓ اختبارات الفصل الأول: الأحد 3 / 1 / 2027 م.</div><div class="audit-ok">✓ اختبارات الفصل الثاني: الأحد 27 / 6 / 2027 م.</div><div class="audit-ok">✓ مجموع أيام الدراسة الرسمي: 93 + 93 = 186 يوم.</div><div class="audit-ok">✓ دالة التاريخ محلية لتجنب انزياح اليوم.</div><div class="audit-ok">✓ البطاقة العائمة "أين أنا الآن؟" تعرض الوضع الحالي والحدث القادم وتدعم الانتقال المباشر وقراءة النص.</div><div class="audit-ok">✓ البطاقة العائمة "أين أنا الآن؟" تعرض الوضع الحالي والحدث القادم وتدعم الانتقال المباشر وقراءة النص.</div></div></div>`}

function taskMatrixInfo(t){
  let important=!!t.important, urgent=!!t.urgent;
  if(important&&urgent)return {key:'do',label:'نفّذ الآن',cls:'eisenhower-do',icon:'🔴'};
  if(important&&!urgent)return {key:'plan',label:'خطّط لها',cls:'eisenhower-plan',icon:'🔵'};
  if(!important&&urgent)return {key:'delegate',label:'فوّض / أنجز سريعاً',cls:'eisenhower-delegate',icon:'🟡'};
  return {key:'low',label:'منخفضة',cls:'eisenhower-low',icon:'⚪'};
}
function taskBadge(t){let m=taskMatrixInfo(t);return `<span class="eisenhower-badge ${m.cls}">${m.icon} ${m.label}</span>`}
function taskDateLabel(dateStr){return `${weekdayName(dateStr)} — ${fmtShortG(dateStr)}`}
function taskItemHTML(t,dateStr){
  let m=taskMatrixInfo(t);
  return `<div class="task-item ${m.cls}" onclick="openDay('${dateStr}')">${t.done?'✅':'□'} ${t.text||t.title||'مهمة'} ${taskBadge(t)}<span class="task-meta">${taskDateLabel(dateStr)}</span></div>`;
}

function renderDayManager(id){
let p=dayData(id);
return `<div class="day-manager">
  <div class="day-manager-section">
    <h3>📝 ملاحظة</h3>
    <textarea id="dm-note" placeholder="اكتب ملاحظة لهذا اليوم">${p.note||''}</textarea>
  </div>
  <div class="day-manager-section">
    <h3>✅ المهام</h3>
    ${(p.tasks||[]).map((t,i)=>`<div class="task-row"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${id}',${i},this.checked)"><span>${t.text} ${taskBadge(t)}</span><button class="btn" onclick="deleteTask('${id}',${i})">حذف</button></div>`).join('')||'<p class="note">لا توجد مهام.</p>'}
    <input id="dm-task-new" placeholder="أضف مهمة جديدة">
    <div class="eisenhower-grid">
      <label class="eisenhower-option"><input type="checkbox" id="dm-important"> مهمة</label>
      <label class="eisenhower-option"><input type="checkbox" id="dm-urgent"> عاجلة</label>
    </div>
    <p class="note">التصنيف يتم حسب مصفوفة أيزنهاور: مهمة + عاجلة = نفّذ الآن، مهمة فقط = خطّط لها، عاجلة فقط = فوّض/أنجز سريعاً.</p>
    <button class="btn" onclick="addTask('${id}')">إضافة مهمة</button>
  </div>
  <div class="day-manager-actions">
    <button class="btn primary" onclick="saveDayManager('${id}')">حفظ اليوم</button>
    <button class="btn danger" onclick="clearDay('${id}')">مسح بيانات اليوم</button>
  </div>
</div>`}
function saveDayManager(id){let p=dayData(id);p.note=$('dm-note')?.value.trim()||'';setDayData(id,p);renderAll();openDay(id);toast('تم حفظ بيانات اليوم')
refreshCalendarViews();
}
function addTask(id){
let inp=$('dm-task-new');
if(!inp||!inp.value.trim())return;
let p=dayData(id);
p.tasks=p.tasks||[];
p.tasks.push({text:inp.value.trim(),done:false,important:!!$('dm-important')?.checked,urgent:!!$('dm-urgent')?.checked});
setDayData(id,p);
openDay(id)

refreshCalendarViews();
}
function toggleTask(id,i,done){let p=dayData(id);if(p.tasks&&p.tasks[i])p.tasks[i].done=done;setDayData(id,p);renderAll()
refreshCalendarViews();
}
function deleteTask(id,i){let p=dayData(id);p.tasks=(p.tasks||[]).filter((_,idx)=>idx!==i);setDayData(id,p);openDay(id)
refreshCalendarViews();
}
function clearDay(id){setDayData(id,{note:'',tasks:[]});renderAll();openDay(id);toast('تم مسح بيانات اليوم')
refreshCalendarViews();
}
function openDay(id){let evs=eventOnDay(id),day=d(id);openModal(`<h2>${weekdayName(day)}</h2><p class="note">${fmtH(day)}<br>${fmtG(day)}</p>${isWeekend(day)?typeTag('weekend'):''}${personalSummary(id)}${evs.length?evs.map(e=>eventCard(e)).join(''):'<p class="note">لا توجد أحداث رسمية مسجلة في هذا اليوم.</p>'}${renderDayManager(id)}`)}
function openEvent(id){let e=academicCalendar.events.find(x=>x.id===id);openModal(`<h2>${e.title}</h2>${typeTag(e.type)}${dateHTML(e)}<p class="note">${e.desc}<br>${remainingText(e)}</p><button class="btn primary" onclick='openCalendarOptions("${e.id}")'>إضافة إلى التقويم</button>`)}
function openCalendarOptions(id){let e=academicCalendar.events.find(x=>x.id===id),google=googleUrl(e),outlook=outlookUrl(e);openModal(`<h2>إضافة إلى التقويم</h2><p class="note">${e.title}<br>${weekdayName(e.start)}<br>${e.hStart}<br>${fmtShortG(e.start)}</p><div class="event-actions"><a class="btn primary" href="${google}" target="_blank">Google Calendar</a><a class="btn" href="${outlook}" target="_blank">Outlook Calendar</a><button class="btn gold" onclick='downloadICS(["${e.id}"],"${e.id}.ics")'>تحميل ICS</button></div>`)}
function openModal(html){$('modalContent').innerHTML=html;$('modal').classList.add('show')}function closeModal(){$('modal').classList.remove('show')}window.onclick=e=>{if(e.target===$('modal'))closeModal()}
function icsDate(s){return s.replaceAll('-','')}function esc(s){return String(s).replace(/[\\,;]/g,'\\$&').replace(/\n/g,'\\n')}
function eventToICS(e){let end=iso(addDays(d(e.end||e.start),1));return `BEGIN:VEVENT\nUID:${e.id}@masar-calendar\nDTSTAMP:${new Date().toISOString().replace(/[-:]/g,'').split('.')[0]}Z\nDTSTART;VALUE=DATE:${icsDate(e.start)}\nDTEND;VALUE=DATE:${icsDate(end)}\nSUMMARY:${esc(e.title)}\nDESCRIPTION:${esc('التقويم الدراسي '+academicCalendar.yearLabel+'\nالحدث: '+e.title+'\nاليوم: '+weekdayName(e.start)+'\nهجري: '+e.hStart+(e.hEnd&&e.hEnd!==e.hStart?' إلى '+e.hEnd:'')+'\nميلادي: '+fmtShortG(e.start)+(e.end&&e.end!==e.start?' إلى '+fmtShortG(e.end):'')+'\nالنوع: '+typeInfo[e.type][0])}\nEND:VEVENT`}
function downloadICS(ids,filename){let arr=academicCalendar.events.filter(e=>ids.includes(e.id)),ics='BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Masar//Academic Calendar//AR\nCALSCALE:GREGORIAN\nMETHOD:PUBLISH\n'+arr.map(eventToICS).join('\n')+'\nEND:VCALENDAR',blob=new Blob([ics],{type:'text/calendar;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);toast('تم إنشاء ملف التقويم')}
function googleUrl(e){let end=iso(addDays(d(e.end||e.start),1));return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(e.title)}&dates=${icsDate(e.start)}/${icsDate(end)}&details=${encodeURIComponent(e.desc+'\nاليوم: '+weekdayName(e.start)+'\nهجري: '+e.hStart+'\nميلادي: '+fmtShortG(e.start))}`}
function outlookUrl(e){let end=iso(addDays(d(e.end||e.start),1));return `https://outlook.live.com/calendar/0/deeplink/compose?subject=${encodeURIComponent(e.title)}&startdt=${e.start}&enddt=${end}&allday=true&body=${encodeURIComponent(e.desc+'\nاليوم: '+weekdayName(e.start)+'\nهجري: '+e.hStart+'\nميلادي: '+fmtShortG(e.start))}`}
function exportPersonalJSON(){let blob=new Blob([JSON.stringify(loadPersonal(),null,2)],{type:'application/json;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='masar-calendar-notes.json';a.click();URL.revokeObjectURL(a.href);toast('تم تصدير البيانات')}
function exportPersonalCSV(){let data=loadPersonal(),rows=[['date','hijri','gregorian','note','tasks']];Object.keys(data).sort().forEach(id=>{let p=data[id];rows.push([id,fmtH(d(id)),fmtShortG(id),p.note||'',(p.tasks||[]).map(t=>(t.done?'[x] ':'[ ] ')+t.text).join(' | ')])});let csv=rows.map(r=>r.map(x=>`"${String(x).replaceAll('"','""')}"`).join(',')).join('\n'),blob=new Blob([csv],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='masar-calendar-notes.csv';a.click();URL.revokeObjectURL(a.href);toast('تم تصدير CSV')}
function importPersonalJSON(){let input=document.createElement('input');input.type='file';input.accept='.json,application/json';input.onchange=()=>{let f=input.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{savePersonal(JSON.parse(r.result));renderAll();toast('تم الاستيراد')}catch(e){toast('ملف غير صالح')}};r.readAsText(f)};input.click()}
function clearPersonalData(){if(confirm('مسح جميع الملاحظات والمهام؟')){localStorage.removeItem(personalKey);renderAll();toast('تم المسح')}}
function toast(t){$('toast').textContent=t;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',2500)}
function toggleTheme(){let n=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=n;localStorage.academicTheme=n;$('themeBtn').textContent=n==='dark'?'':''}
$('themeBtn').onclick=toggleTheme;$('allIcsBtn').onclick=()=>downloadICS(academicCalendar.events.map(e=>e.id),'academic-calendar-rc2.ics');
function renderAll(){renderHome();renderAnnual();renderWeeks(localStorage.weekTerm||'term1');renderMonthly();renderFiltered(['holiday','national'],'panel-holidays','الإجازات');renderExams();renderCounters();renderStats();renderTasks();renderNext();renderSettings();renderLive()}
function init(){document.documentElement.dataset.theme=localStorage.academicTheme||'light';$('themeBtn').textContent=document.documentElement.dataset.theme==='dark'?'':'';renderShell();renderAll();setInterval(()=>{renderLive();updateCountdowns()},1000)}
init();
</script>
</body>
