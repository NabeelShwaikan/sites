<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>بوابة مسار</title>
  <meta name="description" content="فهرس نظيف وهادئ بدون شريط البحث." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #f7f7fb;
      --panel:#ffffff;
      --ink:#0f172a;
      --muted:#5b6270;
      --border: rgba(15,23,42,.10);
      --brand:#2563eb;
      --brand-2:#10b981;
      --chip:#eef2ff;
      --radius: 16px;
      --shadow: 0 12px 30px rgba(2,6,23,.08);
    }
    [data-theme="dark"]{
      --bg: #0b1120;
      --panel:#0f172a;
      --ink:#e5e7eb;
      --muted:#aab3c5;
      --border: rgba(148,163,184,.22);
      --brand:#60a5fa;
      --brand-2:#34d399;
      --chip:#0b1020;
      --shadow: 0 14px 34px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; background: var(--bg);
      color:var(--ink); font:16px/1.65 "Cairo", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Kufi Arabic", Arial, sans-serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }

    .wrap{max-width:1024px; margin-inline:auto; padding:28px;}

    header{display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:16px}
    .brand{display:flex; align-items:center; gap:14px}
    .logo{width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg, var(--brand), var(--brand-2)); box-shadow:var(--shadow); display:grid; place-items:center}
    .logo svg{width:22px; height:22px; fill:#fff}
    h1{margin:0; font-size:clamp(20px, 3.5vw, 28px)}
    .subtitle{color:var(--muted); font-size:14px; margin-top:2px}

    .btn{border:1px solid var(--border); background:linear-gradient(135deg, var(--brand), var(--brand-2)); color:#fff; padding:9px 12px; border-radius:12px; cursor:pointer; box-shadow:var(--shadow); transition:transform .12s ease, box-shadow .12s ease, filter .12s ease}
    .btn:hover{transform:translateY(-1px); filter:brightness(1.02)}
    .btn:active{transform:translateY(0); filter:brightness(.98)}
    .btn:focus-visible{outline:2px solid rgba(96,165,250,.55); outline-offset:2px}
    .btn.icon{width:44px; height:44px; display:grid; place-items:center; padding:0; border-radius:12px}

    /* SVG أيقونة الشمس/القمر */
    .icon-svg{width:22px; height:22px; display:block}
    .icon-svg .sun{opacity:1; transition:opacity .22s ease}
    .icon-svg .moon{opacity:0; transition:opacity .22s ease}
    .icon-svg.dark .sun{opacity:0}
    .icon-svg.dark .moon{opacity:1}
    @keyframes twirl{from{transform:rotate(0deg)} to{transform:rotate(180deg)}}
    .btn.icon.twirl{animation: twirl .45s ease}

    .panel{background: var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow)}

    section{margin-top:18px}
    section h2{margin:0 0 8px; font-size:16px}
    .grid{display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:14px; padding:14px}
    .card{
      position:relative; overflow:hidden; background: var(--panel); border:1px solid var(--border); border-radius:16px; padding:14px; display:flex; gap:12px; align-items:flex-start; transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }
    .card:hover{transform:translateY(-3px); box-shadow:var(--shadow); border-color: rgba(37,99,235,.35)}
    .ic{min-width:38px; height:38px; border-radius:10px; display:grid; place-items:center; background:linear-gradient(135deg, var(--brand), var(--brand-2)); color:#fff; transition: transform .18s ease} 
    .card:hover .ic, .card:focus-within .ic{ transform: rotate(10deg) } 
    @media (prefers-reduced-motion: reduce){ .ic{transition:none} }
    .ic svg{width:18px; height:18px; fill:#fff}
    .card a{color:inherit; text-decoration:none}
    .card h3{margin:0 0 6px; font-size:16px}
    .muted{color:var(--muted)}

    footer{margin-top:24px; text-align:center; color:var(--muted); font-size:13px}
/* انتقال ناعم بين السمات (ثالثًا-2) */
    html[data-theme], body{transition: background-color .4s ease, color .4s ease}
    .panel, .card, .btn, .logo{transition: background-color .4s ease, color .4s ease, border-color .4s ease, box-shadow .4s ease}

  
    .status-line{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:16px;margin:2px 0 14px;color:var(--muted);font-size:13px;font-weight:600}
    .status-line span{white-space:nowrap}.status-line .time-value{color:var(--ink);font-weight:800;font-variant-numeric:tabular-nums}
    .knowledge-card{margin:6px 0 18px;background:radial-gradient(circle at top left,rgba(37,99,235,.08),transparent 34%),radial-gradient(circle at bottom right,rgba(16,185,129,.10),transparent 36%),var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;position:relative;overflow:hidden}
    .knowledge-card::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--brand),var(--brand-2))}
    .knowledge-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}.knowledge-title{font-size:15px;font-weight:800;color:var(--ink)}
    .knowledge-actions{display:flex;gap:8px;flex-wrap:wrap}.mini-btn{border:1px solid var(--border);background:var(--chip);color:var(--ink);padding:5px 9px;border-radius:999px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700}
    .knowledge-text{font-size:clamp(17px,2.2vw,22px);line-height:1.85;font-weight:700;margin:4px 0 12px;color:var(--ink)}
        .knowledge-practical{display:none;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);color:var(--muted);font-size:14px;line-height:1.8}.knowledge-card.is-open .knowledge-practical{display:block}
    .wellness-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin:0 0 18px}.wellness-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:flex;align-items:center;gap:16px;min-height:142px}.wellness-meta{flex:1;min-width:0}.wellness-title{font-size:15px;font-weight:800;margin-bottom:6px}.wellness-date{color:var(--muted);font-size:13px;line-height:1.5}
    .ring-wrap{position:relative;width:104px;height:104px;flex:0 0 104px;display:grid;place-items:center}.ring-svg{width:104px;height:104px;transform:rotate(-90deg)}.ring-bg{fill:none;stroke:rgba(148,163,184,.22);stroke-width:10}.ring-progress{fill:none;stroke:url(#ringGradient);stroke-width:10;stroke-linecap:round;stroke-dasharray:283;stroke-dashoffset:283;transition:stroke-dashoffset .7s ease}
    .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.05}.ring-number{font-size:28px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}.ring-unit{font-size:11px;color:var(--muted);font-weight:700;margin-top:4px}
    @media (max-width:520px){.wrap{padding:20px}.knowledge-card{padding:15px}.knowledge-head{align-items:flex-start}.knowledge-text{font-size:17px}.wellness-card{min-height:132px;padding:14px}.ring-wrap,.ring-svg{width:94px;height:94px;flex-basis:94px}.ring-number{font-size:25px}.status-line{gap:10px;font-size:12.5px}}

  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M3 5h8v6H3V5Zm10 0h8v6h-8V5ZM3 13h8v6H3v-6Zm10 0h8v6h-8v-6Z"/></svg>
        </div>
        <div>
          <h1>بوابة مسار</h1>
          <div class="subtitle">اختر مسارك… وابدأ</div>
        </div>
      </div>
      <button class="btn icon" id="themeBtn" aria-label="تبديل السمة" title="تبديل السمة"></button>
    </header>

    <div class="status-line" role="status" aria-live="polite">
      <span class="time-value" id="timeNow">--:--</span>
      <span id="dayName">—</span>
      <span id="hijriDate">—</span>
      <span id="gregDate">—</span>
      <span id="contextPulse">—</span>
    </div>

    <section class="knowledge-card" id="knowledgeCard" aria-label="رسالة اليوم">
      <div class="knowledge-head">
        <div class="knowledge-title" id="knowledgeTitle">رسالة اليوم</div>
        <div class="knowledge-actions">
          <button class="mini-btn" id="toggleKnowledge" type="button">التطبيق العملي</button>
          <button class="mini-btn" id="nextKnowledge" type="button">رسالة أخرى</button>
        </div>
      </div>
      <div class="knowledge-text" id="knowledgeText">الفعل يسبق الحماس؛ ابدأ بخطوة صغيرة ثم دع الدافع يلحق بك.</div>
      <div class="knowledge-practical" id="knowledgePractical">ابدأ اليوم بمهمة واحدة لا تتجاوز دقيقتين، ثم وسّعها بعد كسر حاجز البداية.</div>
    </section>

    <div class="wellness-grid" aria-label="عدادات بوابة مسار">
      <article class="wellness-card">
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true"><defs><linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="var(--brand)"/><stop offset="100%" stop-color="var(--brand-2)"/></linearGradient></defs><circle class="ring-bg" cx="52" cy="52" r="45"></circle><circle class="ring-progress" id="salaryRing" cx="52" cy="52" r="45"></circle></svg>
          <div class="ring-center"><div class="ring-number" id="salaryDays">--</div><div class="ring-unit">يوماً</div></div>
        </div>
        <div class="wellness-meta"><div class="wellness-title">الراتب القادم</div><div class="wellness-date" id="salaryDate">—</div></div>
      </article>
      <article class="wellness-card">
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 104 104" aria-hidden="true"><circle class="ring-bg" cx="52" cy="52" r="45"></circle><circle class="ring-progress" id="ramadanRing" cx="52" cy="52" r="45"></circle></svg>
          <div class="ring-center"><div class="ring-number" id="ramadanDays">--</div><div class="ring-unit">يوماً</div></div>
        </div>
        <div class="wellness-meta"><div class="wellness-title">رمضان القادم</div><div class="wellness-date" id="ramadanDate">—</div></div>
      </article>
    </div>


    <section class="panel">
      <h2 style="padding:12px 14px">📚 الصفحات المتاحة</h2>
      <div class="grid" id="grid"></div>
    </section>

    <footer>© <span id="y"></span></footer>
  </div>

  <script>
    // ——— البيانات ———
    const PAGES = [
      // 📖 الدينية
      { title: "متابعة قراءة القرآن الكريم", href: "Pages/Tilawah.html", desc: "تابع تقدّمك اليومي 📖", emoji: "📖" },
      { title: "الأربعون النووية", href: "NawawiFourty/index.html", desc: "الأربعون النووية بشرح الشيخ ابن عثيمين رحمه الله 📖", emoji: "📚" },

      // 🧠 الثقافية والمعرفية
         {title: "التقويم الدراسي التفاعلي للعام الدراسي 1449/1448هـ",  href: "Pages/AcademicCalendar.html", desc: "التقويم الدراسي الذكي مع العدادات والمهام والمتابعة 📅",emoji: "🎓" },
      { title: "اختبارات الوعي المعرفي", href: "Awareness/index.html", desc: "اختبارات مبسطة لرفع وعيك", emoji: "🧠" },
      { title: "أدوات التحليل الإداري", href: "ManagementModels/index.html", desc: "أدوات تحليل احترافية تساعدك على اتخاذ قرارات أفضل", emoji: "🧭" },
      { title: "تمارين التركيز والانتباه", href: "FucusExcercises/index.html", desc: "جلسات بصرية هادئة لإعادة ضبط الانتباه", emoji: "🎯" },
      { title: "الساعة الرملية", href: "Pages/SandHourglass.html", desc: "مؤقت تفاعلي بساعة رملية واقعية", emoji: "⏳" },

      // 🎓 التعليمية
      { title: "تعلّم الإنجليزية للمبتدئين", href: "Pages/LearnEnglish.html", desc: "تعلّم الكلمات الإنجليزية ✨", emoji: "📘" },
      { title: "جمل إنجليزية مهمة", href: "Sentences/index.html", desc: "جمل إنجليزية مهمة ومفيدة للمبتدئين", emoji: "📝" },
      { title: "تمارين رياضيات باللعب", href: "MathGame/index.html", desc: "عزز مهارة طفلك في الرياضيات", emoji: "➗" },

      // ☕ أسلوب الحياة
      { title: "بوابة القهوة", href: "cafe/index.html", desc: "لمحبي القهوة", emoji: "☕" },
      { title: "قياس المؤشرات الصحية", href: "Pages/vitals.html", desc: "مؤشراتك الحيوية باختصار", emoji: "🩺" },

      // 👨‍👩‍👧‍👦 العائلة والمجتمع
      { title: "شجرة العائلة", href: "FamilyTree/index.html", desc: "ابني شجرة لعائلتك بخطوات بسيطة", emoji: "🌳" },
      { title: "تصويت", href: "Pages/Poll.html", desc: "صوّت وشارك الرأي", emoji: "🗳️" },

      // 🎮 الترفيه والألعاب
      { title: "لعبة الحروف", href: "LettersGame/index.html", desc: "إنسان، حيوان، نبات ...", emoji: "🎲" },
      { title: "عجلة الحظ", href: "Pages/luck.html", desc: "تجارب عشوائية خفيفة", emoji: "🎡" },
          { title: "كشاف الجالكسي برو",  href: "Pages/torch.html", desc: "SOS، عرض ضوئي تفاعلي",    emoji: "🔦"},
      // ⚽ المناسبات والأحداث
      { title: "مباريات كأس العالم 2026", href: "Pages/WorldCup2026.html", desc: "بوابة كأس العالم 2026", emoji: "🏆" },
    ];

    // ——— عناصر DOM ———
    const grid = document.getElementById('grid');
    const y = document.getElementById('y');
    const themeBtn = document.getElementById('themeBtn');

    // ——— SVG مولّد ———
    function themeSVG(mode){
      const isDark = mode === 'dark';
      return `
        <svg class="icon-svg ${isDark ? 'dark' : ''}" viewBox="0 0 24 24" aria-hidden="true">
          <!-- Sun -->
          <g class="sun">
            <circle cx="12" cy="12" r="4" fill="#fff"/>
            <g stroke="#fff" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="2" x2="12" y2="5"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="2" y1="12" x2="5" y2="12"/>
              <line x1="19" y1="12" x2="22" y2="12"/>
              <line x1="4.2" y1="4.2" x2="6.6" y2="6.6"/>
              <line x1="17.4" y1="17.4" x2="19.8" y2="19.8"/>
              <line x1="4.2" y1="19.8" x2="6.6" y2="17.4"/>
              <line x1="17.4" y1="6.6" x2="19.8" y2="4.2"/>
            </g>
          </g>
          <!-- Moon -->
          <g class="moon">
            <path d="M16.5 12.5a6.5 6.5 0 1 1-5-11 7 7 0 0 0 5 11z" fill="#fff"/>
          </g>
        </svg>`;
    }

    // ——— أيقونة السمة ———
    function setThemeIconFromAttr(){
      const mode = document.documentElement.getAttribute('data-theme') || 'light';
      themeBtn.dataset.icon = mode === 'dark' ? 'moon' : 'sun';
      themeBtn.innerHTML = themeSVG(mode);
    }

    // ——— رسم البطاقات ———
    function render(){
      const icon = `<div class='ic'><svg viewBox='0 0 24 24'><path d='M3 5h8v6H3V5Zm10 0h8v6h-8V5ZM3 13h8v6H3v-6Zm10 0h8v6h-8v-6Z'/></svg></div>`;
      grid.innerHTML = PAGES.map(p => `
        <article class='card'>
          ${icon}
          <div>
            <a href='${p.href}'><h3>${p.emoji || ''} ${p.title}</h3></a>
            ${p.desc ? `<div class='muted'>${p.desc}</div>` : ''}
          </div>
        </article>`).join('');
    }

    // ——— تبديل السمة ———
    function toggleTheme(){
      const mode = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', mode);
      localStorage.setItem('theme', mode);
      // حركة خفيفة
      themeBtn.classList.add('twirl');
      setTimeout(()=> themeBtn.classList.remove('twirl'), 460);
      setThemeIconFromAttr();
    }

    // ——— التاريخ/الوقت (الرياض) ———
    const TZ = 'Asia/Riyadh';
    function formatTime(d){
      return new Intl.DateTimeFormat('ar-SA', { hour: '2-digit', minute:'2-digit', hour12:false, timeZone: TZ }).format(d);
    }
    function dayName(d){
      return new Intl.DateTimeFormat('ar-SA', { weekday:'long', timeZone: TZ }).format(d);
    }
    function hijri(d){
      return new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', { day:'numeric', month:'long', year:'numeric', timeZone: TZ }).format(d);
    }
    function greg(d){
      return new Intl.DateTimeFormat('ar-SA-u-ca-gregory', { day:'numeric', month:'long', year:'numeric', timeZone: TZ }).format(d);
    }

    function contextPulse(d){
      const hour = Number(new Intl.DateTimeFormat('en-US', { hour:'2-digit', hour12:false, timeZone: TZ }).format(d));
      const weekday = new Intl.DateTimeFormat('en-US', { weekday:'short', timeZone: TZ }).format(d);

      const hijriParts = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', {
        day:'numeric',
        month:'numeric',
        timeZone: TZ
      }).formatToParts(d);

      const hijriDay = Number(hijriParts.find(p => p.type === 'day')?.value);
      const hijriMonth = Number(hijriParts.find(p => p.type === 'month')?.value);

      // المناسبات الإسلامية أولاً
      if(hijriMonth === 9) return '🌙 رمضان مبارك';
      if(hijriMonth === 10 && hijriDay === 1) return '🎉 عيد فطر مبارك';
      if(hijriMonth === 12 && hijriDay >= 1 && hijriDay <= 8) return '🕋 عشر ذي الحجة المباركة';
      if(hijriMonth === 12 && hijriDay === 9) return '🤲 يوم عرفة';
      if(hijriMonth === 12 && hijriDay >= 10 && hijriDay <= 13) return '🐑 عيد أضحى مبارك';

      // أيام الأسبوع
      if(weekday === 'Fri') return '🤍 جمعة مباركة';
      if(weekday === 'Sun' && hour >= 5 && hour < 12) return '🚀 بداية أسبوع جديد';
      if(weekday === 'Thu' && hour >= 15) return '🎉 بداية عطلة نهاية الأسبوع';
      if(weekday === 'Sat' && hour >= 16) return '📅 مساء السبت';

      // الوقت
      if(hour >= 4 && hour < 6) return '🌅 بداية يوم جديد';
      if(hour >= 6 && hour < 10) return '☀️ صباح الخير';
      if(hour >= 10 && hour < 12) return '🌞 صباح متأخر';
      if(hour >= 12 && hour < 15) return '🌤️ منتصف النهار';
      if(hour >= 15 && hour < 18) return '🌇 مساء الخير';
      if(hour >= 18 && hour < 22) return '🌙 مساء الخير';
      if(hour >= 22 || hour < 1) return '🌌 ليلة هادئة';
      return '😴 تصبح على خير';
    }

    function updateClock(){
      const now = new Date();
      document.getElementById('timeNow').textContent = formatTime(now);
      document.getElementById('dayName').textContent = dayName(now);
      document.getElementById('hijriDate').textContent = hijri(now);
      document.getElementById('gregDate').textContent = greg(now);
      document.getElementById('contextPulse').textContent = contextPulse(now);
    }
    function scheduleMinuteTick(){
      const now = new Date();
      const ms = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
      setTimeout(()=>{ updateClock(); setInterval(updateClock, 60*1000); }, Math.max(0, ms));
    }

    // ——— بدء التشغيل ———
    (function init(){
      // سنة الفوتر
      y.textContent = new Date().getFullYear();
      // استعادة السمة المحفوظة
      const saved = localStorage.getItem('theme');
      if(saved) document.documentElement.setAttribute('data-theme', saved);
      // بناء الشبكة
      render();
      // أيقونة الزر حسب السمة الحالية (SVG)
      setThemeIconFromAttr();
      // مستمع النقر
      themeBtn.addEventListener('click', toggleTheme);
      // تحديث الوقت الآن ثم جدولة التحديث كل دقيقة
      updateClock();
      scheduleMinuteTick();
      // —— اختبارات بسيطة (test cases) ——
      runTests();
    })();

    // ——— اختبارات (Console) لضمان السلامة ———
    function runTests(){
      try{
        // 1) يتوافق عدد البطاقات مع PAGES
        const cards = document.querySelectorAll('.card');
        console.assert(cards.length === PAGES.length, `Expected ${PAGES.length} cards, got ${cards.length}`);
        // 2) الروابط غير فارغة
        const links = Array.from(document.querySelectorAll('.card a'));
        console.assert(links.every(a => a.getAttribute('href')), 'Every card must contain a link with href');

        // 3) عناصر الوقت والتواريخ غير فارغة
        const t1 = document.getElementById('timeNow').textContent.trim();
        const d1 = document.getElementById('dayName').textContent.trim();
        const h1 = document.getElementById('hijriDate').textContent.trim();
        const g1 = document.getElementById('gregDate').textContent.trim();
        console.assert(t1 && d1 && h1 && g1, 'Topbar date/time pills should be populated');

        console.log('%cAll tests passed', 'color: #16a34a');
      }catch(err){
        console.error('Tests failed:', err);
      }
    }

,"details":"عندما تنظر للمشكلة من زاوية واحدة، تضيق الحلول. تغيير المنظور يوسع الخيارات.","action":"اكتب المشكلة من وجهة نظر شخص آخر يتأثر بها.","question":"كيف تبدو المشكلة لو نظر إليها شخص مختلف عنك؟","source":"مشروع المستويات التنفيذية","tags":["المرونة المعرفية","exercise","مستويات تنفيذية"],"concept_id":"CF-006","domain":"المرونة المعرفية","domain_order":4,"subcategory":"المرونة المعرفية","reference":"مشروع المستويات التنفيذية","review_status":"Reviewed","atomic":true,"prerequisites":[],"related":[]},{"id":49,"status":"Published","type":"mistake","category":"المراجعة والتحسين","level":4,"title":"المراجعة بعد الفشل فقط","message":"راجع النجاح كما تراجع الخطأ.","details":"النجاح غير المراجع قد يتكرر بالصدفة. فهم سبب النجاح يجعله قابلاً للتكرار.","action":"اكتب سببًا واحدًا لنجاح مهمة أنجزتها هذا الأسبوع.","question":"ما السلوك الذي نجح وتريد تكراره عمدًا؟","source":"مشروع المستويات التنفيذية","tags":["المراجعة والتحسين","المراجعة","mistake","مستويات تنفيذية"],"concept_id":"REF-003","domain":"المراجعة والتحسين","domain_order":8,"subcategory":"المراجعة","reference":"مشروع المستويات التنفيذية","review_status":"Reviewed","atomic":true,"prerequisites":[],"related":["REF-004"]},{"id":50,"status":"Published","type":"strategy","category":"المراجعة والتحسين","level":5,"title":"حوّل المراجعة إلى تعديل","message":"المراجعة بلا تعديل وصف.","details":"قيمة المراجعة تظهر عندما تنتج عنها خطوة مختلفة في المرة القادمة، لا عندما تكتفي بتفسير ما حدث.","action":"بعد مراجعة أي تعثر، اكتب تعديلًا واحدًا ستطبقه في المحاولة القادمة.","question":"ما التعديل العملي الناتج عن آخر مراجعة؟","source":"مشروع المستويات التنفيذية","tags":["المراجعة والتحسين","المراجعة","strategy","مستويات تنفيذية"],"concept_id":"REF-004","domain":"المراجعة والتحسين","domain_order":8,"subcategory":"المراجعة","reference":"مشروع المستويات التنفيذية","review_status":"Reviewed","atomic":true,"prerequisites":[],"related":[]}];

    let knowledgeItems = [];
    let typeQueues = {};
    let typeCycle = [];
    let lastKnowledgeId = null;
    let lastKnowledgeType = null;

    function shuffleArray(arr){
      const copy = [...arr];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getPublishedKnowledge(){
      return (knowledgeItems.length ? knowledgeItems : FALLBACK_KNOWLEDGE)
        .filter(item => !item.status || item.status === 'Published');
    }

    function rebuildTypeQueues(){
      const published = getPublishedKnowledge();
      typeQueues = {};

      published.forEach(item => {
        const t = item.type || 'general';
        if(!typeQueues[t]) typeQueues[t] = [];
        typeQueues[t].push(item);
      });

      Object.keys(typeQueues).forEach(t => {
        typeQueues[t] = shuffleArray(typeQueues[t]);
      });

      typeCycle = shuffleArray(Object.keys(typeQueues));

      if(typeCycle.length > 1 && lastKnowledgeType && typeCycle[0] === lastKnowledgeType){
        typeCycle.push(typeCycle.shift());
      }
    }

    function pickKnowledge(){
      const published = getPublishedKnowledge();
      if(!published.length) return FALLBACK_KNOWLEDGE[0];

      if(!typeCycle.length) rebuildTypeQueues();

      let selectedType = null;

      while(typeCycle.length){
        const candidateType = typeCycle.shift();
        if(typeQueues[candidateType] && typeQueues[candidateType].length){
          selectedType = candidateType;
          break;
        }
      }

      if(!selectedType){
        rebuildTypeQueues();
        selectedType = typeCycle.shift();
      }

      let item = (typeQueues[selectedType] || []).shift();

      if(item && published.length > 1 && item.id === lastKnowledgeId){
        const alternativeType = typeCycle.find(t => typeQueues[t] && typeQueues[t].length);
        if(alternativeType){
          typeCycle = typeCycle.filter(t => t !== alternativeType);
          typeCycle.unshift(selectedType);
          selectedType = alternativeType;
          item = typeQueues[selectedType].shift();
        }
      }

      if(typeQueues[selectedType] && typeQueues[selectedType].length){
        typeCycle.push(selectedType);
      }

      lastKnowledgeId = item?.id ?? null;
      lastKnowledgeType = item?.type ?? null;

      return item || published[0];
    }

    function practicalFromItem(item){
      return item.action || item.practical || 'حوّل هذه الرسالة إلى خطوة صغيرة قابلة للتنفيذ خلال أقل من دقيقتين.';
    }

    function renderKnowledge(item){
      const card = document.getElementById('knowledgeCard');
      if(card) card.classList.remove('is-open');

      document.getElementById('knowledgeTitle').textContent = KNOWLEDGE_TYPE_LABELS[item.type] || 'رسالة اليوم';
      document.getElementById('knowledgeText').textContent = item.message || item.content || item.title || 'رسالة اليوم';
      document.getElementById('knowledgePractical').textContent = practicalFromItem(item);
    }

    async function loadKnowledgeBase(){
      try{
        const res = await fetch('Data/executive_knowledge.json', {cache:'no-store'});
        if(!res.ok) throw new Error('not found');
        const data = await res.json();
        knowledgeItems = Array.isArray(data.items) ? data.items : [];
      }catch(e){
        knowledgeItems = FALLBACK_KNOWLEDGE;
      }

      typeQueues = {};
      typeCycle = [];
      renderKnowledge(pickKnowledge());
    }

    function daysBetween(from, to){
      const s = new Date(from.getFullYear(), from.getMonth(), from.getDate());
      const e = new Date(to.getFullYear(), to.getMonth(), to.getDate());
      return Math.ceil((e - s) / 86400000);
    }

    function formatGregReadable(d){
      return new Intl.DateTimeFormat('ar-SA-u-ca-gregory', {
        day:'numeric',
        month:'long',
        year:'numeric',
        timeZone:TZ
      }).format(d);
    }

    function nextSalaryDate(){
      const now = new Date();
      let y = now.getFullYear();
      let m = now.getMonth();

      function salaryFor(Y, M){
        const d = new Date(Y, M, 27);
        const day = d.getDay();
        if(day === 5) d.setDate(26);
        else if(day === 6) d.setDate(28);
        return d;
      }

      let salary = salaryFor(y, m);
      if(daysBetween(now, salary) < 0){
        m++;
        if(m > 11){ m = 0; y++; }
        salary = salaryFor(y, m);
      }

      return salary;
    }

    function setRing(id, ratio){
      const el = document.getElementById(id);
      if(!el) return;

      const c = 2 * Math.PI * 45;
      el.style.strokeDasharray = String(c);
      el.style.strokeDashoffset = String(c);

      requestAnimationFrame(() => {
        const v = Math.max(0, Math.min(1, ratio));
        el.style.strokeDashoffset = String(c * (1 - v));
      });
    }

    function updateWellnessCounters(){
      const now = new Date();

      const salary = nextSalaryDate();
      const sd = Math.max(0, daysBetween(now, salary));
      document.getElementById('salaryDays').textContent = sd;
      document.getElementById('salaryDate').textContent = formatGregReadable(salary);
      setRing('salaryRing', (31 - Math.min(31, sd)) / 31);

      const ramadan = new Date(2027, 1, 8);
      const rd = Math.max(0, daysBetween(now, ramadan));
      document.getElementById('ramadanDays').textContent = rd;
      document.getElementById('ramadanDate').textContent = formatGregReadable(ramadan);
      setRing('ramadanRing', (365 - Math.min(365, rd)) / 365);
    }

    document.getElementById('nextKnowledge').addEventListener('click', () => {
      renderKnowledge(pickKnowledge());
    });

    document.getElementById('toggleKnowledge').addEventListener('click', () => {
      document.getElementById('knowledgeCard').classList.toggle('is-open');
    });

    loadKnowledgeBase();
    updateWellnessCounters();


  </script>
